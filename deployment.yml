apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlops
  labels:
    app: mlops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlops
  template:
    metadata:
      labels:
        app: mlops
    spec:
      containers:
        - name: mlops-container
          image: 429288623250.dkr.ecr.us-east-2.amazonaws.com/mlops:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: aws-secrets
          env:
            - name: MLFLOW_TRACKING_URI
              value: "http://mlflow-service:5000"
            - name: S3_BUCKET
              value: "raghunath2604-mlops-dvc-data"
            - name: AWS_DEFAULT_REGION
              value: "us-east-2"
          ports:
            - containerPort: 8005